name: paper

on:
  push:
    paths:
      - 'paper.md'
      - 'paper.bib'
      - '.github/workflows/paper.yml'
  workflow_dispatch:

jobs:
  build-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build JOSS paper PDF
        uses: openjournals/openjournals-draft-action@v1

      - name: Upload paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper.pdf